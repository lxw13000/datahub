logging:
  config: classpath:logback-spring.xml
  file:
    path: ${LOG_DIR:/app/logs/es-server}
  level:
    root: INFO
    com.tsd.sano.es: INFO
    com.tsd.sano.es.importer: INFO
    org.springframework: INFO
    org.springframework.jdbc.core: INFO
    co.elastic.clients: WARN
    org.elasticsearch.client: WARN
    io.lettuce.core: WARN
    com.zaxxer.hikari: INFO

sano:
  log:
    # 生产环境保留周期较长，便于追踪历史同步问题。
    max-file-size: 100MB
    max-history: 30
    total-size-cap: 10GB
    async-queue-size: 8192
  es:
    uris: ${ES_URIS:127.0.0.1:9201}
    username: ${ES_USERNAME:elastic}
    password: ${ES_PASSWORD:es2peter}
    socket-timeout: 600000
    connection-timeout: 500000
    connection-request-timeout: 5000
    max-conn-total: 100
    max-conn-per-route: 20

    import:
      # 默认关闭；确认ES和数据库配置无误后再打开
      task-enabled: true
      # 每天03:00导入昨天的数据
      cron: "0 0 3 * * ?"
      # 每轮定时调度最多运行8小时，超时后不再启动下一条待执行任务
      max-run-hours: 8
      # 每轮调度最多拉取100条待执行任务，覆盖多表和少量历史积压场景
      task-fetch-limit: 100
      # 每批读取数据库数量
      read-batch-size: 10000
      # Bulk线程数
      worker-count: 4
      # BlockingQueue 队列缓存容量；每个元素是一批read-batch-size数据，生产环境不宜过大。
      queue-capacity: 16
      # 每次Bulk文档数
      bulk-actions: 3000
      # 或每次bulk累计8MB立即发送，单位MB
      bulk-size-mb: 8
      # 最大重试次数
      retry-times: 3
      # Retry等待(ms)
      retry-interval: 1000
      # 失败文档数超过该值时不绑定alias
      max-failed-documents: 1000
      # 失败率超过该值时不绑定alias，0.001 = 0.1%
      max-failure-rate: 0.001
      # 是否开启导入监控
      enable-monitor: true

      # 单机Docker ES建议保持0副本
      # 导入期间是否关闭Refresh
      disable-refresh: true
      # 导入期间是否关闭副本
      disable-replica: true
      # 导入完成是否删除历史索引
      delete-history-index: false
      # 保留历史索引天数
      reserve-days: 30

      tables:
        - enabled: true
          index-alias: sano_wallet_coin_record
          table-name: sano_wallet_coin_record
          mapping-file: sano_wallet_coin_record.json
          id-column: id
          dt-column: dt
          # where-sql为空时自动使用 dt = importDate
          where-sql:



