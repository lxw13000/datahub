spring:
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2
          max-wait: 2000ms
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://database-1-instance-1-ap-southeast-1b.cbiiioywwvwg.ap-southeast-1.rds.amazonaws.com:3306/sano-prod?useUnicode=true&characterEncoding=UTF8&zeroDateTimeBehavior=convertToNull&allowMultiQueries=true&useSSL=false&serverTimezone=Asia/Chongqing&allowPublicKeyRetrieval=true
    username: ${MYSQL_UNM:admin}
    password: ${MYSQL_PWD:fl#alHGaldsj!skgnn2850allgnJsHg}

sano:
  es:
    uris: ${ES_URIS:127.0.0.1:9201}
    username: ${ES_USERNAME:elastic}
    password: ${ES_PASSWORD:es2peter}
    socket-timeout: 600000
    connection-timeout: 500000
    connection-request-timeout: 5000
    max-conn-total: 100
    max-conn-per-route: 20

    ## 导入配置
    import:
      # 每批读取数据库数量
      page-size: 3000
      # Bulk线程数
      worker-count: 8
      # BlockingQueue队列容量
      queue-capacity: 50
      # Bulk最大文档数
      bulk-actions: 2000
      # Bulk最大体积，单位MB
      bulk-size-mb: 10
      # 最大重试次数
      retry-times: 3
      # Retry等待(ms)
      retry-interval: 1000
      # 是否开启导入监控
      enable-monitor: true
      # 导入完成是否删除历史索引
      delete-history-index: false
      # 保留历史索引天数
      reserve-days: 30
      # 导入期间是否关闭Refresh
      disable-refresh: true
      # 导入期间是否关闭副本
      disable-replica: true


